services:
  - type: web
    name: games-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: games-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: games-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: games-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: games-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
